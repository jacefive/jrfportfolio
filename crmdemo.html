      useEffect(() => {
        // Welcome intro: show once per session, right after the splash fades.
        let seen = false;
        try { seen = sessionStorage.getItem('jfcrm-intro-seen') === '1'; } catch {}
        if (seen) return;
        const t = setTimeout(() => setShowIntro(true), 2100);
        return () => clearTimeout(t);
      }, []);

      const dismissIntro = () => {
        setShowIntro(false);
        try { sessionStorage.setItem('jfcrm-intro-seen', '1'); } catch {}
      };

      useEffect(() => {
        // Demo mode: each visitor gets their own fresh copy in their browser.
        // We always start from the seed data so everyone sees the same clean demo,
        // but their edits persist locally during their session.
        try {
          const saved = sessionStorage.getItem('jfcrm-demo');
          setCompanies(saved ? JSON.parse(saved) : INITIAL_COMPANIES);
        } catch {
          setCompanies(INITIAL_COMPANIES);
        }
        setLoading(false);
      }, []);

      const [savedFlash, setSavedFlash] = useState(false);
      const savedTimer = React.useRef(null);

      const persist = useCallback((data) => {
        setCompanies(data);
        setSavedFlash(true);
        if (savedTimer.current) clearTimeout(savedTimer.current);
        savedTimer.current = setTimeout(() => setSavedFlash(false), 2000);
        try { sessionStorage.setItem('jfcrm-demo', JSON.stringify(data)); } catch(e) {}
      }, []);

      const exportCSV = () => {
        const headers = ["Company","Role","Category","Status","Date Applied","Comp","Location","Contacts","Last Activity","Next Follow-Up"];
        const rows = companies.map(c => [
          c.company, c.role, c.category, c.status, c.dateApplied, c.comp, c.location,
          c.contacts.map(ct => `${ct.name} (${ct.title})`).join("; "),
          c.activityLog[0]?.entry || "",
          c.nextFollowUp,
        ]);
        const csv = [headers, ...rows]
          .map(r => r.map(v => `"${String(v || "").replace(/"/g, '""')}"`).join(","))
          .join("\n");
        const blob = new Blob([csv], { type:"text/csv" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `JF_JobHuntCRM_${new Date().toISOString().slice(0,10)}.csv`;
        a.click();
        URL.revokeObjectURL(url);
      };

      const exportJSON = () => {
        const blob = new Blob([JSON.stringify(companies, null, 2)], { type:"application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `JF_CRM_Backup_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
      };

      const importJSON = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            if (Array.isArray(data)) {
              persist(data);
              setSelectedId(null);
              alert(`Restored ${data.length} companies successfully.`);
            } else {
              alert("Invalid backup file, expected an array of companies.");
            }
          } catch {
            alert("Could not read file. Make sure it's a valid CRM backup.");
          }
        };
        reader.readAsText(file);
        e.target.value = "";
      };

      const selected = companies.find(c => c.id === selectedId) || null;

      const DEFAULT_DIR = { added:"asc", company:"asc", role:"asc", status:"asc", date:"desc", followup:"asc" };
      const applySort = (key) => {
        if (sortBy === key) setSortDir(d => d === "asc" ? "desc" : "asc");
        else { setSortBy(key); setSortDir(DEFAULT_DIR[key] || "asc"); }
      };

      const dir = sortDir === "asc" ? 1 : -1;
      const filtered = companies.filter(c =>
        (statusFilter === "All" || c.status === statusFilter) &&
        (!search || c.company.toLowerCase().includes(search.toLowerCase()) || c.role.toLowerCase().includes(search.toLowerCase()))
      ).sort((a, b) => {
        if (sortBy === "company") return a.company.localeCompare(b.company) * dir;
        if (sortBy === "role")    return (a.role || "").localeCompare(b.role || "") * dir;
        if (sortBy === "status")  return (STATUSES.indexOf(a.status) - STATUSES.indexOf(b.status)) * dir;
        if (sortBy === "date") {
          const da = a.dateApplied ? new Date(a.dateApplied).getTime() : 0;
          const db = b.dateApplied ? new Date(b.dateApplied).getTime() : 0;
          return (da - db) * dir;
        }
        if (sortBy === "followup") {
          // companies with no follow-up date always sink to the bottom, either direction
          if (!a.followUpDate && !b.followUpDate) return 0;
          if (!a.followUpDate) return 1;
          if (!b.followUpDate) return -1;
          return (new Date(a.followUpDate) - new Date(b.followUpDate)) * dir;
        }
        return (companies.indexOf(a) - companies.indexOf(b)) * dir; // "added" = insertion order
      });

      const stats = {
        total:    companies.length,
        active:   companies.filter(c => ["Prospecting","Applied","Interviewing"].includes(c.status)).length,
        contacts: companies.filter(c => c.contacts.length > 0).length,
        rejected: companies.filter(c => c.status === "Not Selected").length,
      };

      const today = () => new Date().toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" });

      const todayISO = () => {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
      };

      // Convert any stored date (ISO, or legacy text like "Jun 6 2026") to ISO for a date input.
      const toISO = (val) => {
        if (!val) return "";
        if (/^\d{4}-\d{2}-\d{2}$/.test(val)) return val;
        const d = new Date(val);
        if (isNaN(d.getTime())) return "";
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
      };

      // Convert an ISO date back to the text format the activity log uses (e.g. "Jun 6 2026").
      const fromISO = (iso) => {
        if (!iso) return "";
        const d = new Date(iso + "T12:00:00");
        if (isNaN(d.getTime())) return iso;
        return d.toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" }).replace(/,/, "");
      };

      const track = () => {};  // analytics removed for the public demo

      // Calls the server-side function, which sends the prompt to Claude and returns the note + real usage metrics.
      const generateFollowup = async (company) => {
        if (!company) return;
        setAiLoading(true); setAiDraft(null); setAiMetrics(null); setAiError(null);
        try {
          const firstContact = (company.contacts && company.contacts[0]) || null;
          const res = await fetch('/.netlify/functions/generate-followup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              companyName: company.company,
              contactName: firstContact ? firstContact.name : 'there',
              contactTitle: firstContact ? firstContact.title : '',
              status: company.status,
              activityLog: (company.activityLog || []).map(l => l.entry).join(' | '),
            }),
          });
          if (res.status === 429) { setAiError("The demo is rate limited right now. Try again in a little while."); return; }
          if (!res.ok) { setAiError("The AI hit a snag. Give it another try in a moment."); return; }
          const data = await res.json();
          setAiDraft(data.draft);
          setAiMetrics(data.metrics);
          // Save this generation into the company's record so it persists and shows in the AI Drafts tab.
          const entry = {
            id: 'ai' + Date.now(),
            text: data.draft,
            addressedTo: firstContact ? firstContact.name : 'there',
            date: new Date().toISOString(),
            metrics: data.metrics,
          };
          persist(companies.map(c => c.id === company.id
            ? { ...c, aiFollowups: [entry, ...(c.aiFollowups || [])] }
            : c));
          track('ai_followup_generated', { company: company.company });
        } catch (e) {
          setAiError("Couldn't reach the AI. Check back in a moment.");
        } finally {
          setAiLoading(false);
        }
      };

      const addLog = () => {
        if (!newActivity.trim() || !selected) return;
        persist(companies.map(c => c.id === selectedId
          ? { ...c, activityLog: [{ id: Date.now().toString(), date: today(), entry: newActivity }, ...c.activityLog] }
          : c));
        setNewAct("");
        track('activity_logged', { company: selected.company });
      };

      const addContact = () => {
        if (!newContact.name.trim()) return;
        persist(companies.map(c => c.id === selectedId
          ? { ...c, contacts: [...c.contacts, { ...newContact, id: Date.now().toString() }] }
          : c));
        setNC({ name:"", title:"", notes:"" });
        setShowAC(false);
        track('contact_added', { company: selected ? selected.company : null });
      };

      const addCompany = () => {
        if (!newCo.company.trim()) return;
        const autoDate = (newCo.status === "Applied" && !newCo.dateApplied) ? todayISO() : (newCo.dateApplied || "");
        const co = { ...newCo, id: Date.now().toString(), category:"SDR/BDR", dateApplied: autoDate,
          contacts:[], activityLog:[{ id: Date.now().toString(), date: today(), entry:"Added to pipeline." }] };
        persist([co, ...companies]);
        setSelectedId(co.id);
        setTab("log");
        setShowCo(false);
        setNewCoData({ company:"", role:"", status:"Prospecting", comp:"", location:"", nextFollowUp:"", followUpDate:"" });
        track('company_added', { company: co.company });
      };

      const changeStatus = (id, status) => {
        persist(companies.map(c => c.id === id
          ? { ...c, status,
              dateApplied: (status === "Applied" && !c.dateApplied) ? todayISO() : c.dateApplied,
              activityLog: [{ id: Date.now().toString(), date: today(), entry: `Status → ${status}` }, ...c.activityLog] }
          : c));
        track('status_changed', { status });
      };

      const openEdit = () => {
        if (!selected) return;
        setEditData({ company: selected.company, role: selected.role, status: selected.status,
          comp: selected.comp, location: selected.location, dateApplied: selected.dateApplied,
          nextFollowUp: selected.nextFollowUp, followUpDate: selected.followUpDate || "" });
        setShowEditCo(true);
        track('edit_opened', { company: selected.company });
      };

      const saveEdit = () => {
        if (!editData || !selected) return;
        const finalData = { ...editData };
        if (finalData.status === "Applied" && !finalData.dateApplied) finalData.dateApplied = todayISO();
        persist(companies.map(c => c.id === selected.id ? { ...c, ...finalData } : c));
        setShowEditCo(false);
        setEditData(null);
        track('company_edited');
      };


      const deleteCompany = () => {
        if (!selected) return;
        if (window.confirm(`Remove ${selected.company} from your pipeline? This cannot be undone.`)) {
          persist(companies.filter(c => c.id !== selected.id));
          setSelectedId(null);
          setShowEditCo(false);
          setEditData(null);
        }
      };

      const deleteLog = (logId) => {
        if (!selected) return;
        if (window.confirm("Remove this activity entry? This cannot be undone.")) {
          persist(companies.map(c => c.id === selectedId
            ? { ...c, activityLog: c.activityLog.filter(l => l.id !== logId) }
            : c));
        }
      };

      const updateLog = (logId) => {
        if (!editingLogText.trim()) return;
        persist(companies.map(c => c.id === selectedId
          ? { ...c, activityLog: c.activityLog.map(l => l.id === logId ? { ...l, entry: editingLogText, date: editingLogDate ? fromISO(editingLogDate) : l.date } : l) }
          : c));
        setEditingLogId(null);
        setEditingLogText("");
        setEditingLogDate("");
      };

      const moveLog = (logId, direction) => {
        if (!selected) return;
        const logs = [...selected.activityLog];
        const idx = logs.findIndex(l => l.id === logId);
        const newIdx = idx + direction;
        if (newIdx < 0 || newIdx >= logs.length) return;
        [logs[idx], logs[newIdx]] = [logs[newIdx], logs[idx]];
        persist(companies.map(c => c.id === selectedId ? { ...c, activityLog: logs } : c));
      };

      const deleteContact = (contactId) => {
        if (!selected) return;
        if (window.confirm("Remove this contact? This cannot be undone.")) {
          persist(companies.map(c => c.id === selectedId
            ? { ...c, contacts: c.contacts.filter(ct => ct.id !== contactId) }
            : c));
        }
      };

      const startEditContact = (ct) => {
        setEditingContactId(ct.id);
        setEditContact({ name: ct.name || "", title: ct.title || "", notes: ct.notes || "" });
      };

      const updateContact = (contactId) => {
        if (!editContact.name.trim()) return;
        persist(companies.map(c => c.id === selectedId
          ? { ...c, contacts: c.contacts.map(ct => ct.id === contactId ? { ...ct, ...editContact } : ct) }
          : c));
        setEditingContactId(null);
      };

      if (loading) return (
        <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", color:"#6e7681", fontSize:14 }}>
          Loading your pipeline...
        </div>
      );

      return (
        <div style={{ background:"#0d1117", minHeight:"100vh", display:"flex", flexDirection:"column" }}>

          {/* SPLASH SCREEN */}
          {showSplash && (
            <div style={{
              position:"fixed", inset:0, zIndex:100,
              background:"#161b22",
              display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
              gap:20, padding:24,
              opacity: splashFade ? 0 : 1,
              transition:"opacity 0.6s ease",
              pointerEvents: splashFade ? "none" : "auto"
            }}
            onClick={() => { setSplashFade(true); setTimeout(() => setShowSplash(false), 600); }}>
              <img src={SPLASH_IMG} alt="J Fyrberg's CRM demo"
                style={{ maxWidth:"min(440px, 85vw)", width:"100%", height:"auto", borderRadius:14, boxShadow:"0 20px 60px rgba(0,0,0,0.5)" }} />
              <div style={{ color:"#e6edf3", fontSize:14, fontWeight:500, letterSpacing:"0.02em" }}>Spinning up the demo…</div>
            </div>
          )}

          {/* HEADER */}
          <div style={{ background:"#161b22", color:"white", padding: isMobile ? "12px 14px" : "12px 20px", display:"flex", alignItems: isMobile ? "stretch" : "center", justifyContent:"space-between", flexShrink:0, flexDirection: isMobile ? "column" : "row", gap: isMobile ? 10 : 0 }}>
            <div style={{ display:"flex", alignItems:"center", gap:12 }}>
              <a href="index.html" title="Back to the home screen" className="os-home"
                style={{ display:"inline-flex", alignItems:"center", gap:6, background:"#03100a", color:"#4dff7a", border:"1px solid #1f8c43", padding:"7px 12px", borderRadius:8, fontSize:13, fontWeight:600, fontFamily:"ui-monospace, 'DejaVu Sans Mono', Menlo, monospace", letterSpacing:"0.5px", textShadow:"0 0 4px rgba(77,255,122,0.55)", textDecoration:"none", whiteSpace:"nowrap", flexShrink:0 }}>
                {"A:\\ HOME"}
              </a>
              <img src={HEADER_IMG} alt="J Fyrberg's CRM demo" style={{ height:42, width:"auto", borderRadius:6, flexShrink:0 }} />
              <div>
                <div style={{ fontSize:15, fontWeight:600, letterSpacing:"-0.3px" }}>J Fyrberg's CRM Demo</div>
                <div style={{ fontSize:11, color:"#8b949e", marginTop:1 }}>A CRM demo built with Claude · Try it, it's yours</div>
              </div>
            </div>
            <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap: isMobile ? "wrap" : "nowrap" }}>
              {savedFlash && <span style={{ fontSize:12, color:"#10b981", fontWeight:500 }}>✓ Saved</span>}
              <input ref={fileInputRef} type="file" accept=".json" style={{ display:"none" }} onChange={importJSON} />
              <button onClick={() => {
                  if (window.confirm("Reset the demo back to the original sample data? Any changes you've made will be cleared.")) {
                    try { sessionStorage.removeItem('jfcrm-demo'); } catch(e) {}
                    setCompanies(INITIAL_COMPANIES);
                    setSelectedId(null);
                    
                  }
                }}
                style={{ background:"#21262d", color:"#6e7681", border:"1px solid #c9d1d9", padding:"7px 14px", borderRadius:8, fontSize:13, fontWeight:500, cursor:"pointer", flex: isMobile ? "1 1 auto" : "0 0 auto" }}>
                Reset to Original Data
              </button>
              <button onClick={() => fileInputRef.current.click()}
                style={{ background:"#21262d", color:"#6e7681", border:"1px solid #c9d1d9", padding:"7px 14px", borderRadius:8, fontSize:13, fontWeight:500, cursor:"pointer", flex: isMobile ? "1 1 auto" : "0 0 auto" }}>
                📂 Restore
              </button>
              <button onClick={exportJSON}
                style={{ background:"#21262d", color:"#6e7681", border:"1px solid #c9d1d9", padding:"7px 14px", borderRadius:8, fontSize:13, fontWeight:500, cursor:"pointer", flex: isMobile ? "1 1 auto" : "0 0 auto" }}>
                💾 Backup
              </button>
              <button onClick={exportCSV}
                style={{ background:"#21262d", color:"#6e7681", border:"1px solid #c9d1d9", padding:"7px 14px", borderRadius:8, fontSize:13, fontWeight:500, cursor:"pointer", flex: isMobile ? "1 1 auto" : "0 0 auto" }}>
                ↓ CSV
              </button>
              <button onClick={() => setShowCo(true)}
                style={{ background:"#58a6ff", color:"white", border:"none", padding:"7px 14px", borderRadius:8, fontSize:13, fontWeight:500, cursor:"pointer", flex: isMobile ? "1 1 100%" : "0 0 auto" }}>
                + Add Company
              </button>
            </div>
          </div>

          {/* STATS */}
          <div style={{ display:"grid", gridTemplateColumns: isMobile ? "repeat(2, 1fr)" : "repeat(4, 1fr)", gap: isMobile ? 8 : 12, padding: isMobile ? "12px 14px 0" : "16px 20px 0", flexShrink:0 }}>
            {[
              { label:"Total Applications", value:stats.total, color:"#58a6ff", icon:"📋" },
              { label:"Active Pipeline",    value:stats.active, color:"#10b981", icon:"🚀" },
              { label:"With Contacts",      value:stats.contacts, color:"#8b5cf6", icon:"👤" },
              { label:"Not Selected",       value:stats.rejected, color:"#ef4444", icon:"✕" },
            ].map(s => (
              <div key={s.label} style={{ background:"#161b22", borderRadius:10, padding:"14px 16px", border:"1px solid #2a3038" }}>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                  <div style={{ fontSize:26, fontWeight:700, color:s.color, letterSpacing:"-1px" }}>{s.value}</div>
                  <div style={{ fontSize:20 }}>{s.icon}</div>
                </div>
                <div style={{ fontSize:11, color:"#6e7681", marginTop:3, fontWeight:500 }}>{s.label}</div>
              </div>
            ))}
          </div>

          {/* FILTER BAR */}
          <div style={{ padding: isMobile ? "12px 14px" : "12px 20px", display:"flex", gap:10, alignItems:"center", flexShrink:0, flexWrap:"wrap" }}>
            <input type="text" placeholder="Search companies or roles..." value={search} onChange={e => setSearch(e.target.value)}
              style={{ flex:"1 1 200px", padding:"8px 12px", border:"1px solid #2a3038", borderRadius:8, fontSize:13, background:"#161b22", color:"#e6edf3", minWidth:0 }} />
            <select value={sortBy} onChange={e => { setSortBy(e.target.value); setSortDir(DEFAULT_DIR[e.target.value] || "asc"); }}
              style={{ padding:"8px 12px", border:"1px solid #2a3038", borderRadius:8, fontSize:13, color:"#e6edf3", background:"#161b22", cursor:"pointer", flex: isMobile ? "1 1 auto" : "0 0 auto" }}>
              <option value="added">Sort: Date Added</option>
              <option value="company">Sort: Company A–Z</option>
              <option value="status">Sort: Status</option>
              <option value="date">Sort: Date Applied</option>
              <option value="followup">Sort: Follow-Up Date</option>
            </select>
            <div style={{ display:"flex", gap:4, flexWrap:"wrap", width: isMobile ? "100%" : "auto" }}>
              {["All", ...STATUSES].map(s => (
                <button key={s} onClick={() => setFilter(s)}
                  style={{ padding:"5px 10px", borderRadius:6, fontSize:11, fontWeight:500, border:"1px solid",
                    borderColor: statusFilter === s ? "#58a6ff" : "#2a3038",
                    background: statusFilter === s ? "#10243e" : "#161b22",
                    color: statusFilter === s ? "#388bfd" : "#8b949e", cursor:"pointer" }}>
                  {s === "Not Selected" ? "Rejected" : s}
                </button>
              ))}
            </div>
          </div>

          {/* MAIN CONTENT */}
          <div style={{ padding: isMobile ? "0 14px 14px" : "0 20px 20px", display:"flex", gap:14, flex:1, minHeight:0 }}>

            {/* TABLE */}
            <div style={{ flex: (selected && !isMobile) ? "0 0 54%" : "1", background:"#161b22", borderRadius:10, border:"1px solid #2a3038", overflow:"auto", display: (selected && isMobile) ? "none" : "block" }}>
              <table style={{ width:"100%", borderCollapse:"collapse" }}>
                <thead style={{ position:"sticky", top:0, background:"#161b22", zIndex:1 }}>
                  <tr style={{ borderBottom:"2px solid #0d1117" }}>
                    {(isMobile
                      ? [["Company","company"],["Status","status"],["Follow-Up","followup"]]
                      : [["Company","company"],["Role","role"],["Status","status"],["Next Follow-Up","followup"]]
                    ).map(([h, key]) => (
                      <th key={h} className="sortable-th" onClick={() => applySort(key)}
                        style={{ padding:"10px 14px", textAlign:"left", fontSize:10, fontWeight:600, color: sortBy === key ? "#b1bac4" : "#6e7681", textTransform:"uppercase", letterSpacing:"0.06em", whiteSpace:"nowrap", cursor:"pointer", userSelect:"none" }}>
                        {h}<span style={{ marginLeft:4, fontSize:9, opacity: sortBy === key ? 1 : 0.25 }}>{sortBy === key && sortDir === "desc" ? "▼" : "▲"}</span>
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {filtered.map(c => (
                    <tr key={c.id} className="row"
                      onClick={() => { const opening = c.id !== selectedId; setSelectedId(c.id === selectedId ? null : c.id); setTab("log"); setAiDraft(null); setAiMetrics(null); setAiError(null); }}
                      style={{ borderBottom:"1px solid #1c2230", background: selectedId === c.id ? "#10243e" : "#161b22", transition:"background 0.1s" }}>
                      <td style={{ padding:"10px 14px" }}>
                        <div style={{ fontWeight:500, fontSize:13, color:"#e6edf3" }}>{c.company}</div>
                        {isMobile && <div style={{ fontSize:11, color:"#8b949e", marginTop:2 }}>{c.role}</div>}
                        {c.contacts.length > 0 && (
                          <div style={{ fontSize:11, color:"#6e7681", marginTop:2 }}>
                            {c.contacts.length} contact{c.contacts.length > 1 ? "s" : ""}
                          </div>
                        )}
                      </td>
                      {!isMobile && <td style={{ padding:"10px 14px", fontSize:12, color:"#b1bac4", whiteSpace:"nowrap" }}>{c.role}</td>}
                      <td style={{ padding:"10px 14px" }}><Badge status={c.status} /></td>
                      <td style={{ padding:"10px 14px", verticalAlign:"top", maxWidth:220 }}>
                        <div style={{ fontSize:11, color: c.followUpDate ? "#388bfd" : "#6e7681", whiteSpace:"nowrap", fontWeight: c.followUpDate ? 600 : 400 }}>
                          {c.followUpDate ? new Date(c.followUpDate + "T12:00:00").toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" }) : "—"}
                        </div>
                        {c.nextFollowUp && (
                          <div style={{ fontSize:11, color:"#6e7681", marginTop:3, lineHeight:1.4, display:"-webkit-box", WebkitLineClamp:2, WebkitBoxOrient:"vertical", overflow:"hidden" }}>
                            {c.nextFollowUp}
                          </div>
                        )}
                      </td>
                    </tr>
                  ))}
                  {filtered.length === 0 && (
                    <tr><td colSpan={isMobile ? 3 : 4} style={{ padding:"32px", textAlign:"center", color:"#6e7681", fontSize:13 }}>No results found</td></tr>
                  )}
                </tbody>
              </table>
            </div>

            {/* DETAIL PANEL */}
            {selected && (
              <div style={ isMobile

                        style={{ flex:"0 0 auto", padding:"8px 12px", border:"1px solid #2a3038", borderRadius:8, fontSize:13, color:"#6e7681", background:"#1c2230", cursor:"pointer", lineHeight:1 }}>
                        ✕
                      </button>}
                  </div>
                </div>
                <div style={{ marginBottom:8 }}>
                  <div style={{ fontSize:11, color:"#6e7681", marginBottom:4, fontWeight:500 }}>Follow-Up Notes</div>
                  <textarea placeholder="Next Follow-Up Notes" value={editData.nextFollowUp}
                    onChange={e => setEditData({ ...editData, nextFollowUp: e.target.value })}
                    rows={2}
                    style={{ width:"100%", padding:"8px 12px", border:"1px solid #2a3038", borderRadius:8, fontSize:13, color:"#e6edf3", background:"#161b22", resize:"none" }} />
                </div>
                <div style={{ marginBottom:8 }}>
                  <div style={{ fontSize:11, color:"#6e7681", marginBottom:4, fontWeight:500 }}>Follow-Up Date</div>
                  <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                    <input type="date" value={editData.followUpDate || ""}
                      onChange={e => setEditData({ ...editData, followUpDate: e.target.value })}
                      style={{ flex:1, padding:"8px 12px", border:"1px solid #2a3038", borderRadius:8, fontSize:13, color:"#e6edf3", background:"#161b22" }} />
                    {editData.followUpDate &&
                      <button onClick={() => setEditData({ ...editData, followUpDate: "" })}
                        title="Clear date"
                        style={{ flex:"0 0 auto", padding:"8px 12px", border:"1px solid #2a3038", borderRadius:8, fontSize:13, color:"#6e7681", background:"#1c2230", cursor:"pointer", lineHeight:1 }}>
                        ✕
                      </button>}
                  </div>
                </div>
                <div style={{ marginBottom:14 }}>
                  <div style={{ fontSize:11, color:"#6e7681", marginBottom:4, fontWeight:500 }}>Status</div>
                  <select value={editData.status} onChange={e => setEditData({ ...editData, status: e.target.value })}
                    style={{ width:"100%", padding:"8px 12px", border:"1px solid #2a3038", borderRadius:8, fontSize:13, color:"#e6edf3", background:"#161b22" }}>
                    {STATUSES.map(s => <option key={s}>{s}</option>)}
                  </select>
                </div>
                <div style={{ display:"flex", gap:8 }}>
                  <button onClick={saveEdit}
                    style={{ flex:1, background:"#58a6ff", color:"white", border:"none", padding:"9px", borderRadius:8, fontSize:13, cursor:"pointer", fontWeight:500 }}>
                    Save Changes
                  </button>
                  <button onClick={() => { setShowEditCo(false); setEditData(null); }}
                    style={{ flex:1, background:"#0d1117", color:"#8b949e", border:"1px solid #2a3038", padding:"9px", borderRadius:8, fontSize:13, cursor:"pointer" }}>
                    Cancel
                  </button>
                </div>
                <button onClick={deleteCompany}
                  style={{ width:"100%", marginTop:8, background:"none", border:"1px solid #5c2626", color:"#ef4444", padding:"8px", borderRadius:8, fontSize:12, cursor:"pointer" }}>
                  Remove from Pipeline
                </button>
              </div>
            </div>
          )}

          {/* FOOTER CREDIT */}
          <div style={{ background:"#161b22", color:"#6e7681", padding:"14px 20px", fontSize:12, textAlign:"center", flexShrink:0, lineHeight:1.7 }}>
            <div style={{ color:"#8b949e", fontWeight:500 }}>Created by Jason Fyrberg · Built with Claude AI</div>
            <div>
              <a href="mailto:JasonFyrberg@gmail.com" style={{ color:"#79c0ff", textDecoration:"none" }}>JasonFyrberg@gmail.com</a>
              {"  ·  "}
              <a href="https://www.linkedin.com/in/jfyrberg" target="_blank" rel="noopener noreferrer" style={{ color:"#79c0ff", textDecoration:"none" }}>linkedin.com/in/jfyrberg</a>
            </div>
            <div style={{ marginTop:6, fontSize:11, color:"#8b949e" }}>This is a demo with fictional data. Your changes save only in your browser.</div>
          </div>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
